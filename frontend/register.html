<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — TaskFlow Pro</title>
  <meta name="description" content="Create your free TaskFlow Pro account and start managing tasks smarter." />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/dark-mode.css" />
</head>
<body class="auth-body" data-page="register">
  <div id="toast-container"></div>

  <!-- Left Panel -->
  <div class="auth-left">
    <div class="auth-left-orb auth-left-orb-1"></div>
    <div class="auth-left-orb auth-left-orb-2"></div>

    <div class="auth-left-content">
      <a href="index.html" class="auth-left-logo">
        <div class="auth-left-logo-icon">⚡</div>
        <span class="auth-left-logo-text">TaskFlow<span>Pro</span></span>
      </a>

      <h2 class="auth-headline">
        Start your<br/>
        <span>productivity journey.</span>
      </h2>

      <div class="auth-features-list">
        <div class="auth-feature-item">
          <div class="auth-feature-check">✓</div>
          Free forever — no credit card needed
        </div>
        <div class="auth-feature-item">
          <div class="auth-feature-check">✓</div>
          Unlimited tasks, projects & categories
        </div>
        <div class="auth-feature-item">
          <div class="auth-feature-check">✓</div>
          Setup in under 5 minutes
        </div>
        <div class="auth-feature-item">
          <div class="auth-feature-check">✓</div>
          Premium UI with dark mode
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel — Form -->
  <div class="auth-right">
    <div class="auth-form-card">
      <h1 class="auth-form-title">Create account</h1>
      <p class="auth-form-subtitle">
        Already have an account?
        <a href="login.html">Sign in →</a>
      </p>

      <form class="auth-form" id="register-form" novalidate>
        <!-- Error -->
        <div class="form-error" style="display:none; align-items:center; gap:8px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-md); padding: 12px 16px; color: var(--color-error); font-size: var(--text-sm);">
          <span>⚠</span> <span></span>
        </div>

        <div class="input-group">
          <label class="input-label" for="name">Full Name <span class="required">*</span></label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="name" class="input"
                   placeholder="Your name" required autocomplete="name" />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="email">Email address <span class="required">*</span></label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉</span>
            <input type="email" id="email" class="input"
                   placeholder="you@example.com" required autocomplete="email" />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="password">Password <span class="required">*</span></label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="input"
                   placeholder="Min 8 chars, 1 uppercase, 1 number"
                   required autocomplete="new-password" />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="confirm-password">Confirm Password <span class="required">*</span></label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="confirm-password" class="input"
                   placeholder="Repeat your password"
                   required autocomplete="new-password" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="register-btn" style="width:100%; justify-content:center; padding: 0.85rem;">
          Create Account
        </button>
      </form>

      <div class="auth-form-footer">
        <a href="login.html">Already have an account? <strong>Sign in</strong></a>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
