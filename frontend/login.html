<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TaskFlow Pro</title>
  <meta name="description" content="Sign in to your TaskFlow Pro account." />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/dark-mode.css" />
</head>
<body class="auth-body" data-page="login">
  <div id="toast-container"></div>

  <!-- Left Panel -->
  <div class="auth-left">
    <div class="auth-left-orb auth-left-orb-1"></div>
    <div class="auth-left-orb auth-left-orb-2"></div>

    <div class="auth-left-content">
      <a href="index.html" class="auth-left-logo">
        <div class="auth-left-logo-icon">⚡</div>
        <span class="auth-left-logo-text">TaskFlow<span>Pro</span></span>
      </a>

      <h2 class="auth-headline">
        Your productivity,<br/>
        <span>supercharged.</span>
      </h2>

      <div class="auth-features-list">
        <div class="auth-feature-item">
          <div class="auth-feature-check">✓</div>
          Manage tasks across all categories
        </div>
        <div class="auth-feature-item">
          <div class="auth-feature-check">✓</div>
          Track weekly productivity with smart charts
        </div>
        <div class="auth-feature-item">
          <div class="auth-feature-check">✓</div>
          Drag-and-drop Kanban board
        </div>
        <div class="auth-feature-item">
          <div class="auth-feature-check">✓</div>
          Secure JWT authentication
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel — Form -->
  <div class="auth-right">
    <div class="auth-form-card">
      <h1 class="auth-form-title">Welcome back</h1>
      <p class="auth-form-subtitle">
        Don't have an account?
        <a href="register.html">Create one free →</a>
      </p>

      <form class="auth-form" id="login-form" novalidate>
        <!-- Error -->
        <div class="form-error" style="display:none; align-items:center; gap:8px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-md); padding: 12px 16px; color: var(--color-error); font-size: var(--text-sm);">
          <span>⚠</span> <span id="login-error"></span>
        </div>

        <div class="input-group">
          <label class="input-label" for="email">Email address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉</span>
            <input type="email" id="email" class="input"
                   placeholder="you@example.com" required autocomplete="email" />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="password">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="input"
                   placeholder="Enter your password" required autocomplete="current-password" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%; justify-content:center; padding: 0.85rem;">
          Sign In
        </button>
      </form>

      <div class="auth-form-footer">
        <a href="register.html">Need an account? <strong>Sign up free</strong></a>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Override form error to use inline span
    document.addEventListener('DOMContentLoaded', () => {
      const origShow = window.showFormError;
      window.showFormError = (form, msg) => {
        const err  = form.querySelector('.form-error');
        const span = form.querySelector('#login-error');
        if (err)  { err.style.display = 'flex'; }
        if (span) { span.textContent = msg; }
      };
    });
  </script>
</body>
</html>
